# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    flags:
      - -trimpath
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: DrakeMazzy
    name: sanctify

nfpms:
  - package_name: sanctify
    homepage: https://github.com/DrakeMazzy/sanctify
    maintainer: DrakeMazzy <6117149+DrakeMazzy@users.noreply.github.com>
    description: Automated semantic versioning and release tool
    license: CC0-1.0
    formats:
      - deb
      - rpm

homebrew_casks:
  - repository:
      owner: DrakeMazzy
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: https://github.com/DrakeMazzy/sanctify
    description: Automated semantic versioning and release tool
    license: CC0-1.0
    binaries:
      - sanctify
    caveats: |
      On macOS, if the binary is blocked by Gatekeeper, run:
        xattr -d com.apple.quarantine $(brew --prefix)/bin/sanctify
